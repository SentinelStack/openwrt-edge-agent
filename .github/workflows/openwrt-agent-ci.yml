name: OpenWrt Agent CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_to_router:
        description: "Deploy to router (requires self-hosted runner in same LAN)"
        required: false
        type: boolean
        default: false

jobs:
  build-and-check:
    name: Build and Check openwrt-agent
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: make docker-build

      - name: Cross-compile openwrt-agent
        run: make build

      - name: Validate binary type
        run: make check

      - name: Upload openwrt-agent artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-agent-armv7
          path: openwrt-agent
          if-no-files-found: error
          retention-days: 14

  deploy-router:
    name: Deploy to OpenWrt Router
    needs: build-and-check
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_to_router == true
    runs-on: self-hosted
    env:
      ROUTER: ${{ secrets.ROUTER_SSH_TARGET }}
      ROUTER_AUTH_MODE: ${{ secrets.ROUTER_AUTH_MODE }}
      ROUTER_PASSWORD: ${{ secrets.ROUTER_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download openwrt-agent artifact
        uses: actions/download-artifact@v4
        with:
          name: openwrt-agent-armv7
          path: .

      - name: Ensure executable bit
        run: chmod +x openwrt-agent scripts/deploy.sh

      - name: Deploy using project script
        run: ./scripts/deploy.sh
