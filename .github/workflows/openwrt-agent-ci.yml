name: OpenWrt Agent CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-check:
    name: Build and Check net_filter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: make docker-build

      - name: Cross-compile net_filter
        run: make build

      - name: Validate binary type
        run: make check

      - name: Upload net_filter artifact
        uses: actions/upload-artifact@v4
        with:
          name: net_filter
          path: net_filter
          if-no-files-found: error
