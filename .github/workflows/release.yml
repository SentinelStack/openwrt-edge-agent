name: OpenWrt Agent Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build ARM Binary and Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: make docker-build

      - name: Cross-compile openwrt-agent
        run: make build

      - name: Validate binary type
        run: make check

      - name: Prepare release assets
        run: |
          cp openwrt-agent openwrt-agent-armv7
          sha256sum openwrt-agent-armv7 > openwrt-agent-armv7.sha256

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            openwrt-agent-armv7
            openwrt-agent-armv7.sha256
